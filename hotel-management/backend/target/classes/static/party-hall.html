<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Party Hall - Dakshin Vihar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <svg width="28" height="28" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="19" cy="19" r="18" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M19 7V31M7 19H31M11 11L27 27M27 11L11 27" stroke="currentColor" stroke-width="2"/>
        </svg>
        Dakshin Vihar
      </div>
      <nav class="navbar-menu">
        <a href="/">Home</a>
        <a href="/#about">About</a>
        <div class="dropdown">
          <a href="#" class="dropdown-toggle">Services</a>
          <div class="dropdown-menu">
            <a href="/party-hall">Party Hall</a>
            <a href="/#rooms">Rooms</a>
          </div>
        </div>
        <a href="/#menu">Menu</a>
        <a href="/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section party-hall-booking-section">
      <div class="container">
        <div class="section-header">
          <h2>Book Party Hall</h2>
          <p>Reserve our elegant party hall for your special events</p>
        </div>

        <div class="booking-form-container">
          <form id="partyHallBookingForm" class="booking-form">
            <div class="form-group">
              <label for="fullName">Full Name *</label>
              <input type="text" id="fullName" name="fullName" required>
              <span class="error-message" id="fullNameError"></span>
            </div>

            <div class="form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required>
              <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
              <label for="phoneNumber">Phone Number *</label>
              <input type="tel" id="phoneNumber" name="phoneNumber" required>
              <span class="error-message" id="phoneNumberError"></span>
            </div>

            <div class="form-group">
              <label for="eventType">Event Type *</label>
              <select id="eventType" name="eventType" required>
                <option value="">Select Event Type</option>
                <option value="Wedding">Wedding</option>
                <option value="Birthday">Birthday</option>
                <option value="Corporate">Corporate</option>
                <option value="Other">Other</option>
              </select>
              <span class="error-message" id="eventTypeError"></span>
            </div>

            <div class="form-group">
              <label for="eventDate">Event Date *</label>
              <input type="date" id="eventDate" name="eventDate" required>
              <span class="error-message" id="eventDateError"></span>
            </div>

            <div class="form-group">
              <label for="timeSlot">Time Slot *</label>
              <select id="timeSlot" name="timeSlot" required>
                <option value="">Select Time Slot</option>
                <option value="Morning">Morning</option>
                <option value="Afternoon">Afternoon</option>
                <option value="Evening">Evening</option>
              </select>
              <span class="error-message" id="timeSlotError"></span>
            </div>

            <div class="form-group">
              <label for="numberOfGuests">Number of Guests *</label>
              <input type="number" id="numberOfGuests" name="numberOfGuests" min="1" required>
              <span class="error-message" id="numberOfGuestsError"></span>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">Submit Booking</button>
          </form>

          <div id="successMessage" class="success-message" style="display: none;">
            <h3>Booking Confirmed!</h3>
            <p>Your booking is confirmed! A confirmation email has been sent.</p>
          </div>

          <div id="errorMessage" class="error-message" style="display: none;">
            <p></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('partyHallBookingForm');
      const successMessage = document.getElementById('successMessage');
      const errorMessage = document.getElementById('errorMessage');
      const submitBtn = document.getElementById('submitBtn');

      // Set minimum date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('eventDate').setAttribute('min', today);

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Clear previous messages
        successMessage.style.display = 'none';
        errorMessage.style.display = 'none';

        // Validate form
        if (!validateForm()) {
          return;
        }

        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
          const formData = new FormData(form);
          const bookingData = {
            fullName: formData.get('fullName'),
            email: formData.get('email'),
            phoneNumber: formData.get('phoneNumber'),
            eventType: formData.get('eventType'),
            eventDate: formData.get('eventDate'),
            timeSlot: formData.get('timeSlot'),
            numberOfGuests: parseInt(formData.get('numberOfGuests'))
          };

          const response = await fetch('/api/party-hall-bookings', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(bookingData)
          });

          if (response.ok) {
            const result = await response.json();
            successMessage.style.display = 'block';
            form.reset();
          } else {
            const error = await response.json();
            showError(error.message || 'An error occurred while booking.');
          }
        } catch (error) {
          showError('Network error. Please try again.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Booking';
        }
      });

      function validateForm() {
        let isValid = true;

        // Clear previous errors
        document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const eventType = document.getElementById('eventType').value;
        const eventDate = document.getElementById('eventDate').value;
        const timeSlot = document.getElementById('timeSlot').value;
        const numberOfGuests = document.getElementById('numberOfGuests').value;

        if (!fullName) {
          document.getElementById('fullNameError').textContent = 'Please enter your name';
          isValid = false;
        }

        if (!email) {
          document.getElementById('emailError').textContent = 'Email is required';
          isValid = false;
        }

        if (!phoneNumber) {
          document.getElementById('phoneNumberError').textContent = 'Phone number is required';
          isValid = false;
        }

        if (!eventType) {
          document.getElementById('eventTypeError').textContent = 'Please select an event type';
          isValid = false;
        }

        if (!eventDate) {
          document.getElementById('eventDateError').textContent = 'Please select a date';
          isValid = false;
        }

        if (!timeSlot) {
          document.getElementById('timeSlotError').textContent = 'Please select a time slot';
          isValid = false;
        }

        if (!numberOfGuests || numberOfGuests < 1) {
          document.getElementById('numberOfGuestsError').textContent = 'Please enter number of guests';
          isValid = false;
        }

        return isValid;
      }

      function showError(message) {
        errorMessage.querySelector('p').textContent = message;
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
